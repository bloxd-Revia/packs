<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Revia t-pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      background: url('https://iili.io/3EpShyN.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 30px;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 80%;
      margin: auto;
    }

    /* 🔥 카드 = 클릭 가능 */
    .card {
      display: block;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.3s;
      text-decoration: none;
      color: white;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="overlay">

  <h1>Revia t-pack</h1>

  <div class="grid">

    <!-- ✅ 카드 전체 클릭 다운로드 -->
    <a href="https://raw.githubusercontent.com/bloxd-Revia/packs/main/starLike.zip" download class="card">
      <div>starLike</div>
    </a>

    <a href="#" class="card">
      <div>1</div>
    </a>

    <a href="#" class="card">
      <div>2</div>
    </a>

  </div>

</div>

</body>
</html>
